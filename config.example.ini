# Moonshot AI (Kimi) API 配置示例
# 复制此文件为 config.ini 并填入您的实际 API 密钥

[moonshot]
# Moonshot API 密钥 (以 ak- 开头)
api_key = your_moonshot_api_key_here

# API 基础 URL (可选，默认为 https://api.moonshot.cn/v1)
api_base = https://api.moonshot.cn/v1

# 默认模型 (可选)
# 可选值: moonshot-v1-8k, moonshot-v1-32k, moonshot-v1-128k
model = moonshot-v1-8k

[openai]
# OpenAI API 配置（如需要）
# api_key = your_openai_api_key_here
