seed: 20260130
experiment_name: end_to_end
output_root: outputs/runs
run_id: auto

environment:
  map_resolution: 1.0
  map_size: [1000.0, 1000.0]
  use_random_semantics: true
  elevation:
    slope_x: 0.0
    slope_y: 0.0
    noise_std: 0.0

planning:
  obstacle_threshold: 0.5
  start: [50.0, 50.0]
  goal: [950.0, 950.0]

dynamics:
  start_pos: [50.0, 50.0]
  end_pos: [950.0, 950.0]
  duration: 100.0
  min_duration: 200.0
  auto_duration: true
  fps: 20
  max_velocity: 1.0
  use_planning_path: true

cesium:
  enabled: true
  output_dir: outputs/visualizations/cesium
  origin: [45.0, 0.0, 0.0]
  sample_step: 10
  time_step: 1.0
